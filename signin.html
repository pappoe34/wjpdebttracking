<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WJP — Welcome back</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505;
    --ink:#f5f1ea;
    --ink-dim:rgba(245,241,234,0.66);
    --ink-faint:rgba(245,241,234,0.42);
    --accent:#22c79e;
    --rule:rgba(245,241,234,0.14);
    --field-bg:#0a0a0a;
    --serif:'Fraunces', Georgia, serif;
    --sans:'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100vh;display:grid;place-items:center;padding:40px 20px}

  .container{width:min(520px, 100%);text-align:center}
  .brand-block{margin:0 auto 40px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .mark{
    width:56px;height:56px;display:block;
    filter:drop-shadow(0 0 50px rgba(34,199,158,0.35));
  }
  .brand-wordmark{
    font-family:var(--serif);font-weight:600;font-size:17px;
    letter-spacing:-0.015em;color:var(--ink);
  }
  .brand-wordmark em{font-style:italic;font-weight:500;color:var(--accent)}

  h1{
    font-family:var(--serif);
    font-weight:600;
    font-size:clamp(36px, 4.4vw, 54px);
    letter-spacing:-0.02em;
    margin-bottom:40px;
    font-variation-settings:"opsz" 144, "SOFT" 30;
  }

  .sso{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px}
  .sso button{
    padding:18px;background:#1a1a1a;color:var(--ink);
    border:1px solid var(--rule);border-radius:12px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
    font-family:var(--sans);font-size:14px;transition:background .15s ease;
  }
  .sso button:hover{background:#242424}
  .sso svg{width:22px;height:22px}

  .divider{
    display:flex;align-items:center;gap:14px;margin:24px 0 18px;
    color:var(--ink);font-family:var(--sans);font-size:13.5px;font-weight:500;
  }
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--rule)}

  .field{text-align:left;margin-bottom:12px}
  .field input{
    width:100%;padding:18px 20px;border-radius:12px;
    background:var(--field-bg);border:1px solid var(--rule);
    color:var(--ink);font-family:var(--sans);font-size:15px;
    outline:none;transition:border-color .15s ease, background .15s ease;
  }
  .field input:focus{border-color:rgba(245,241,234,0.45);background:#0f0f0f}
  .field input::placeholder{color:var(--ink-faint)}
  .password-wrap{position:relative}
  .password-wrap button.eye{
    position:absolute;right:16px;top:50%;transform:translateY(-50%);
    background:none;border:0;color:var(--ink-dim);cursor:pointer;padding:6px;
  }

  .forgot{margin:18px 0 22px;text-align:center}
  .forgot a{color:var(--ink);text-decoration:underline;text-underline-offset:3px;font-size:14px}

  .pill{
    width:100%;padding:18px;border-radius:12px;
    background:#fff;color:#0a0a0a;border:none;cursor:pointer;
    font-family:var(--serif);font-weight:600;font-size:16px;letter-spacing:-.01em;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .pill:hover{transform:translateY(-1px);box-shadow:0 12px 40px rgba(0,0,0,0.5)}

  .swap{margin-top:22px;color:var(--ink-dim);font-size:14px}
  .swap a{color:var(--ink);text-decoration:underline;text-underline-offset:3px;margin-left:4px}

  .fineprint{
    margin-top:40px;color:var(--ink-faint);font-size:11px;
    letter-spacing:.16em;text-transform:uppercase;
  }

  /* Form states */
  .field.error input{border-color:#ff6b6b;background:rgba(255,107,107,0.04)}
  .err-msg{color:#ff9494;font-size:12px;margin-top:6px;display:none}
  .field.error .err-msg{display:block}
  .pill[disabled]{opacity:.6;cursor:not-allowed}
  .pill.loading{pointer-events:none}

  /* Toast */
  .toast{
    position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#111;border:1px solid var(--rule);border-radius:100px;
    padding:14px 22px;color:var(--ink);font-size:13.5px;font-weight:500;
    opacity:0;pointer-events:none;transition:all .25s ease;z-index:100;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <form class="container" id="signin-form">
    <div class="brand-block">
      <svg class="mark" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" aria-label="WJP Budgetting logo">
        <defs>
          <linearGradient id="wjpGradSignin" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22e0b4"/>
            <stop offset="100%" stop-color="#00a382"/>
          </linearGradient>
        </defs>
        <rect width="56" height="56" rx="16" fill="url(#wjpGradSignin)"/>
        <text x="28" y="34" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-weight="700" font-size="26" fill="#041a14" letter-spacing="-1">W</text>
        <path d="M12 44 L22 42 L30 39 L40 35 L44 32" stroke="#041a14" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.55"/>
        <circle cx="44" cy="32" r="1.8" fill="#041a14"/>
      </svg>
      <span class="brand-wordmark">WJP <em>Budgetting</em></span>
    </div>
    <h1>Welcome back</h1>

    <div class="sso">
      <button type="button" aria-label="Continue with Apple" onclick="ssoStub('Apple')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 12.5c-.03-3.05 2.49-4.51 2.6-4.58-1.41-2.07-3.61-2.35-4.39-2.38-1.87-.19-3.65 1.1-4.6 1.1-.95 0-2.42-1.07-3.97-1.04-2.04.03-3.92 1.19-4.97 3.01-2.13 3.69-.55 9.17 1.53 12.18.99 1.47 2.17 3.12 3.71 3.06 1.49-.06 2.05-.96 3.84-.96 1.79 0 2.3.96 3.87.93 1.6-.03 2.62-1.5 3.6-2.98 1.13-1.71 1.6-3.37 1.62-3.46-.04-.01-3.1-1.18-3.14-4.68zM14.21 4.24c.82-1 1.38-2.4 1.23-3.8-1.19.05-2.65.8-3.5 1.8-.76.88-1.43 2.31-1.25 3.68 1.33.1 2.69-.68 3.52-1.68z"/></svg>
      </button>
      <button type="button" aria-label="Continue with Google" onclick="ssoStub('Google')">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      </button>
    </div>

    <div class="divider">Or sign in with email</div>

    <div class="field" id="email-field">
      <input type="email" id="email" placeholder="Email" autocomplete="email" required />
      <div class="err-msg">Enter a valid email address</div>
    </div>
    <div class="field password-wrap" id="pw-field">
      <input type="password" placeholder="Password" autocomplete="current-password" required id="pw" minlength="6" />
      <button type="button" class="eye" aria-label="Show password" onclick="const p=document.getElementById('pw');p.type=p.type==='password'?'text':'password'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <div class="err-msg">Password must be at least 6 characters</div>
    </div>

    <div class="forgot"><a href="#" onclick="event.preventDefault(); forgotPw()">Forgot your password?</a></div>

    <button class="pill" type="submit" id="submit-btn">Sign in</button>

    <div class="swap">Don't have an account yet?<a href="./signup.html">Sign up</a></div>
    <div class="fineprint">256-bit encryption · Bank-level security</div>
  </form>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
  function showToast(msg, ms){
    const t = document.getElementById('toast');
    if(!t) return;
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(window.__toastTO);
    window.__toastTO = setTimeout(() => t.classList.remove('show'), ms || 2600);
  }
  function ssoStub(provider){
    showToast(provider + ' sign-in coming soon — use email for now');
  }
  function forgotPw(){
    const email = document.getElementById('email').value.trim();
    if(!email){ showToast('Enter your email above first'); document.getElementById('email').focus(); return; }
    showToast('Password reset link sent to ' + email);
  }
  function isEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  document.getElementById('signin-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const emailEl = document.getElementById('email');
    const pwEl    = document.getElementById('pw');
    const emailFld= document.getElementById('email-field');
    const pwFld   = document.getElementById('pw-field');
    let ok = true;
    emailFld.classList.remove('error'); pwFld.classList.remove('error');
    if(!isEmail(emailEl.value.trim())){ emailFld.classList.add('error'); ok=false; }
    if(pwEl.value.length < 6){ pwFld.classList.add('error'); ok=false; }
    if(!ok){ showToast('Please fix the errors above'); return; }

    const btn = document.getElementById('submit-btn');
    btn.classList.add('loading'); btn.disabled = true; btn.textContent = 'Signing in…';
    try{
      localStorage.setItem('wjp_user', JSON.stringify({ email: emailEl.value.trim(), signedInAt: Date.now() }));
    }catch(_){}
    showToast('Welcome back — opening your dashboard');
    setTimeout(() => { window.location.href = './index.html'; }, 900);
  });
</script>
</body>
</html>
