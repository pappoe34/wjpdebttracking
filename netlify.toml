[build]
  publish = "."
  functions = "netlify/functions"
  # Skip build when only non-deployed paths changed (docs, scratch scripts, secrets).
  # Netlify runs this in the repo root; non-zero exit => skip deploy.
  ignore = "git diff --quiet HEAD^ HEAD -- ':!README*' ':!docs/' ':!.secrets/' ':!*.py' ':!*.md'"

[functions]
  node_bundler = "esbuild"

# Serve the landing page at the root URL so bots, AI crawlers, and social
# previews get crawlable marketing content instead of the auth-gated app shell.
# `force = true` is required because index.html physically exists at / — without
# force, Netlify serves the file directly and ignores this rewrite.
# The actual app still lives at /index.html (direct URL match bypasses this).
[[redirects]]
  from = "/"
  to = "/intro.html"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Let fonts be cached aggressively for repeat visits
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"


# P26: welcome email sequence — run daily at 13:00 UTC (9 AM ET).
# Function checks each user's account age and sends Day 0 / Day 3 / Day 7 emails.
[functions."email-cron"]
  schedule = "0 13 * * *"

[functions."email-cron-w3"]
  schedule = "0 14 * * *"

# P22: 14-day trial + Free-tier cleanup — runs daily at 02:00 UTC.
# Finds users where gracePeriodEndsAt < now AND tier === 'free', then calls
# Plaid /item/remove on their items so we stop being billed for unpaid users.
[functions."cleanup-free-tier-items"]
  schedule = "0 2 * * *"

[functions."state-backup-cron"]
  schedule = "0 3 * * *"
  # Server-side nightly backup of every user's state/main doc to userBackups/{uid}/snapshots/{YYYYMMDD}.
  # Independent of client browser — last line of defence against data loss.

